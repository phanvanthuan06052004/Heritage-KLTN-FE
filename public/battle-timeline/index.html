<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historical Battle Timeline</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header class="app-header">
    <h1 class="app-title">Historical Battle Timeline</h1>
    <p class="app-subtitle">Interactive Battlefield Visualization</p>
  </header>

  <div class="main-layout">
    <!-- Left Panel: Input -->
    <aside class="panel panel-input" id="inputPanel">
      <div class="panel-header">
        <h2>Battle Description</h2>
        <div class="panel-actions">
          <select id="battlePreset" class="preset-select">
            <option value="">-- Load Preset --</option>
          </select>
          <button id="btnAnalyze" class="btn btn-primary" disabled>Analyze Battle</button>
        </div>
      </div>
      <div class="panel-body">
        <textarea id="battleInput" class="battle-textarea" placeholder="Enter or paste a historical battle description here...

Example:
In the early morning, Vietnamese forces advanced from the western hills. After several hours of artillery bombardment, the French defensive position was weakened. Infantry units launched an assault and captured the stronghold.

Or select a preset from the dropdown above."></textarea>
        <div class="api-config">
          <label class="config-label">
            Claude API Key <span class="optional">(optional, for AI analysis)</span>
          </label>
          <input type="password" id="apiKey" class="config-input" placeholder="sk-ant-api-...">
          <div class="config-toggle">
            <label class="toggle-label">
              <input type="checkbox" id="useSimulation" checked>
              Use simulation mode (no API key needed)
            </label>
          </div>
        </div>
      </div>
      <div class="panel-footer">
        <span id="analysisStatus" class="status-text"></span>
      </div>
    </aside>

    <!-- Center: Canvas -->
    <main class="panel panel-canvas" id="canvasPanel">
      <div class="canvas-container">
        <canvas id="battleCanvas"></canvas>
        <div class="canvas-overlay" id="canvasOverlay">
          <div class="overlay-content">
            <div class="overlay-icon">&#9876;</div>
            <p>Enter a battle description and click <strong>Analyze Battle</strong><br>or select a preset to begin</p>
          </div>
        </div>
      </div>
      <div class="narration-bar" id="narrationBar">
        <div class="narration-step" id="narrationStep">Step 0 of 0</div>
        <p class="narration-text" id="narrationText"></p>
        <div class="narration-entities" id="narrationEntities"></div>
      </div>
    </main>

    <!-- Right Panel: Controls & Timeline -->
    <aside class="panel panel-controls" id="controlPanel">
      <div class="panel-header">
        <h2>Playback Controls</h2>
      </div>
      <div class="panel-body">
        <div class="timeline-info">
          <span class="tl-label">Timeline:</span>
          <span class="tl-count" id="tlCount">0 steps</span>
        </div>
        <div class="speed-control">
          <span class="speed-label">Speed</span>
          <div class="speed-buttons">
            <button class="speed-btn" data-speed="0.5">x0.5</button>
            <button class="speed-btn active" data-speed="1">x1</button>
            <button class="speed-btn" data-speed="2">x2</button>
            <button class="speed-btn" data-speed="4">x4</button>
          </div>
        </div>
        <div class="playback-buttons">
          <button id="btnFirst" class="ctrl-btn" title="First Step">&#9198;</button>
          <button id="btnPrev" class="ctrl-btn" title="Previous Step">&#9194;</button>
          <button id="btnPlay" class="ctrl-btn ctrl-play" title="Play / Pause">&#9654;</button>
          <button id="btnNext" class="ctrl-btn" title="Next Step">&#9193;</button>
          <button id="btnLast" class="ctrl-btn" title="Last Step">&#9197;</button>
        </div>
        <div class="loop-control">
          <label class="toggle-label">
            <input type="checkbox" id="loopToggle">
            Loop Playback
          </label>
        </div>
        <div class="step-slider">
          <input type="range" id="stepSlider" min="0" max="0" value="0" step="1">
          <div class="slider-labels" id="sliderLabels"></div>
        </div>

        <!-- Timeline Steps -->
        <div class="timeline-steps" id="timelineSteps">
          <p class="empty-timeline">No timeline generated yet</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- Summary Modal -->
  <div class="modal" id="summaryModal">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2 class="modal-title">Battle Summary</h2>
      <div class="modal-body" id="summaryBody"></div>
      <button class="btn btn-close" id="btnCloseSummary">Close</button>
    </div>
  </div>
</div>

<script type="module" src="icons.js"></script>
<script type="module" src="battle-data.js"></script>
<script type="module" src="validator.js"></script>
<script type="module" src="timeline.js"></script>
<script type="module" src="renderer.js"></script>
<script type="module" src="animator.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
